name: Wake up Streamlit App
on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Playwright to wake up app
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            try {
              console.log('--- Đang truy cập App ---');
              await page.goto('https://fruit-visual-question-answering.streamlit.app/', { waitUntil: 'networkidle', timeout: 60000 });
              
              // Chờ nút xuất hiện trong tối đa 10 giây
              const wakeUpButton = await page.waitForSelector('[data-testid=\"wakeup-button-owner\"]', { timeout: 10000 }).catch(() => null);

              if (wakeUpButton) {
                console.log('--- Phát hiện nút Wake Up. Đang nhấn... ---');
                await wakeUpButton.click();
                console.log('--- Đã nhấn! Đợi 15s để app load... ---');
                await page.waitForTimeout(15000); 
                console.log('--- Hoàn tất đánh thức ---');
              } else {
                console.log('--- Không thấy nút Wake Up. Có vẻ app vẫn đang chạy bình thường ---');
              }
              
              console.log('Tiêu đề trang:', await page.title());
            } catch (err) {
              console.error('Lỗi rồi:', err.message);
            } finally {
              await browser.close();
            }
          })();
          "
