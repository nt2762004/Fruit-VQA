name: Wake up Streamlit App
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Playwright to wake up app
        run: |
          node - e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('https://fruit-visual-question-answering.streamlit.app/', { waitUntil: 'networkidle' });
            console.log('Page title:', await page.title());
            await page.waitForTimeout(5000); // Đợi 5s để đảm bảo JS đã chạy
            await browser.close();
          })();
          "
